name: Deploy InfiniteX WAF to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  # ── 1. Build & test ──────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install WAF dependencies
        run: npm ci

      - name: Build WAF backend
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            dashboard/dist/
          retention-days: 1

  # ── 2. Deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production       # requires approval if configured in repo settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dashboard/node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/infinitex/

      - name: Install deps & restart on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "sudo /opt/infinitex/scripts/update.sh"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/api/health || echo "000")
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check EC2 logs with: pm2 logs infinitex"
